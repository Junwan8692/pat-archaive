<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pat Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>PAT ARCHIVE</h1>
  <div class="header-btns">
    <button class="add-btn" onclick="openPromptModal()">+ 이미지/프롬프트</button>
    <button class="add-btn" onclick="openModal()">+ 링크 추가</button>
  </div>
</header>

<nav class="page-nav">
  <a class="page-nav-tab active" href="#">📁 링크 보관함</a>
</nav>

<!-- ===== Pat recommendation ===== -->
<section class="featured-section" id="featuredSection" style="display:none">
  <div class="featured-header">
    <div class="featured-title">
      <span>Pat recommendation</span>
    </div>
    <div class="featured-subtitle">팟이 추천하는 것들</div>
  </div>
  <div class="featured-scroll" id="featuredScroll"></div>
</section>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="제목, URL 검색...">
  </div>
  <div class="tag-filters">
    <button class="tag-btn active" data-tag="전체">전체</button>
    <button class="tag-btn" data-tag="AI">AI</button>
    <button class="tag-btn" data-tag="Vibecoding">Vibecoding</button>
    <button class="tag-btn" data-tag="Image">Image</button>
    <button class="tag-btn" data-tag="Video">Video</button>
    <button class="tag-btn" data-tag="Product">Product</button>
    <button class="tag-btn" data-tag="Github">Github</button>
    <button class="tag-btn" data-tag="ComfyUI">ComfyUI</button>
    <button class="tag-btn" data-tag="Design">Design</button>
    <button class="tag-btn" data-tag="Prompt">Prompt</button>
    <button class="tag-btn" data-tag="Idea">Idea</button>
    <button class="tag-btn" data-tag="Assets">Assets</button>
    <button class="tag-btn" data-tag="ETC">ETC</button>
  </div>
  <div id="authorFilterBadge" style="display:none;align-items:center;gap:4px;background:#eef6fc;border:1px solid var(--border-dark);border-radius:3px;padding:4px 8px;font-size:11px;color:var(--sky);font-weight:bold;">
    <span></span>
    <button onclick="window._clearAuthorFilter()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;line-height:1;padding:0 2px;">✕</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="desc">최신순</option>
    <option value="asc">오래된순</option>
    <option value="likes">좋아요순</option>
    <option value="comments">댓글순</option>
  </select>
</div>

<div id="status">DB 연결 중...</div>
<div class="grid" id="grid" style="display:none"></div>


<!-- Add/Edit Modal -->
<div class="modal-bg" id="modalBg" onclick="handleBgClick(event)">
  <div class="modal">
    <h2 id="modalTitle">링크 추가</h2>
    <label>URL</label>
    <input type="url" id="urlInput" placeholder="https://..." oninput="onUrlChange()">
    <label>제목 <span style="color:#555;font-size:11px">(자동 입력됨, 수정 가능)</span></label>
    <input type="text" id="titleInput" placeholder="제목">
    <label>상세설명 <span style="color:#555;font-size:11px">(선택)</span></label>
    <input type="text" id="descInput" placeholder="짧은 메모...">
    <label>올린 사람 <span style="color:#555;font-size:11px">(선택)</span></label>
    <input type="text" id="authorInput" placeholder="닉네임...">
    <div class="author-quick-btns" id="authorQuickBtns"></div>
    <button type="button" class="author-add-btn" onclick="window.addAuthor()">+ 이름 추가</button>
    <label>태그</label>
    <div class="modal-tags">
      <button class="modal-tag" data-tag="AI">AI</button>
      <button class="modal-tag" data-tag="Vibecoding">Vibecoding</button>
      <button class="modal-tag" data-tag="Image">Image</button>
      <button class="modal-tag" data-tag="Video">Video</button>
      <button class="modal-tag" data-tag="Product">Product</button>
      <button class="modal-tag" data-tag="Github">Github</button>
      <button class="modal-tag" data-tag="ComfyUI">ComfyUI</button>
      <button class="modal-tag" data-tag="Design">Design</button>
      <button class="modal-tag" data-tag="Prompt">Prompt</button>
      <button class="modal-tag" data-tag="Idea">Idea</button>
      <button class="modal-tag" data-tag="Assets">Assets</button>
      <button class="modal-tag" data-tag="ETC">ETC</button>
    </div>

    <!-- 프롬프트 태그 선택 시 표시 -->
    <div class="prompt-fields" id="promptFields">
      <div class="prompt-fields-header">프롬프트 상세</div>
      <label>프롬프트 소개</label>
      <textarea id="promptIntroInput" placeholder="어떤 용도의 프롬프트인지 간단히..."></textarea>
      <label>프롬프트 실행환경 <span style="color:#555;font-size:11px">(예: DALL-E, ComfyUI, Midjourney)</span></label>
      <input type="text" id="promptEnvInput" placeholder="실행환경...">
      <label>프롬프트</label>
      <textarea id="promptTextInput" placeholder="프롬프트 본문..." style="min-height:120px"></textarea>
      <label>활용 팁 <span style="color:#555;font-size:11px">(선택)</span></label>
      <textarea id="promptTipInput" placeholder="사용 팁이나 주의사항..."></textarea>
    </div>

    <label class="pin-toggle">
      <input type="checkbox" id="pinnedInput">
      <span>✦ Pat recommendation에 고정</span>
    </label>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" id="saveBtn" onclick="saveLink()">저장</button>
    </div>
  </div>
</div>

<!-- Prompt Add Modal -->
<div class="modal-bg" id="promptModalBg" onclick="handlePromptBgClick(event)">
  <div class="modal" style="width:520px;max-width:95vw">
    <h2>프롬프트 추가</h2>
    <label>제목</label>
    <input type="text" id="pTitleInput" placeholder="프롬프트 제목">
    <label>올린 사람 <span style="color:#555;font-size:11px">(선택)</span></label>
    <input type="text" id="pAuthorInput" placeholder="닉네임...">
    <label>태그</label>
    <div class="modal-tags" id="promptModalTagsContainer">
      <button class="modal-tag selected" data-tag="Prompt">Prompt</button>
      <button class="modal-tag" data-tag="AI">AI</button>
      <button class="modal-tag" data-tag="Image">Image</button>
      <button class="modal-tag" data-tag="Video">Video</button>
      <button class="modal-tag" data-tag="ComfyUI">ComfyUI</button>
      <button class="modal-tag" data-tag="ETC">ETC</button>
    </div>
    <label>이미지 <span style="color:#555;font-size:11px">(여러 장 가능)</span></label>
    <div class="upload-area" onclick="document.getElementById('imageFiles').click()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:6px;display:block;margin-left:auto;margin-right:auto"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      클릭해서 이미지 선택
      <input type="file" id="imageFiles" accept="image/*,.heic,.heif" multiple style="display:none" onchange="handleImageSelect(event)">
    </div>
    <div class="upload-preview" id="uploadPreview"></div>
    <div class="prompt-fields-header" style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-top:18px;margin-bottom:4px">프롬프트 내용</div>
    <label>프롬프트 소개</label>
    <textarea id="pPromptIntroInput" placeholder="어떤 용도의 프롬프트인지 간단히..."></textarea>
    <label>실행환경 <span style="color:#555;font-size:11px">(예: DALL-E, ComfyUI, Midjourney)</span></label>
    <input type="text" id="pPromptEnvInput" placeholder="실행환경...">
    <label>프롬프트</label>
    <textarea id="pPromptTextInput" placeholder="프롬프트 본문..." style="min-height:120px"></textarea>
    <label>활용 팁 <span style="color:#555;font-size:11px">(선택)</span></label>
    <textarea id="pPromptTipInput" placeholder="사용 팁이나 주의사항..."></textarea>
    <label class="pin-toggle">
      <input type="checkbox" id="pPinnedInput">
      <span>✦ Pat recommendation에 고정</span>
    </label>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePromptModal()">취소</button>
      <button class="btn-save" id="pSaveBtn" onclick="savePrompt()">저장</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="detail-bg" id="detailBg">
  <div class="detail-modal" id="detailModal">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-top">
      <div class="detail-thumb-wrap" id="detailThumbWrap"></div>
      <div class="detail-info">
        <div class="detail-tags" id="detailTags"></div>
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <div class="detail-stats" id="detailStats"></div>
      </div>
    </div>
    <div class="detail-body" id="detailBody" style="display:none"></div>
    <div class="comments-section" id="commentsSection">
      <div class="comments-title">댓글</div>
      <div id="commentsList"></div>
      <div class="comment-form">
        <input type="text" id="commentAuthor" placeholder="닉네임">
        <textarea id="commentText" placeholder="댓글을 남겨보세요..."></textarea>
        <button class="comment-submit" onclick="submitComment()">등록</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
